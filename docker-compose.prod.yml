services:
  postgres:
    image: postgres:17-alpine
    container_name: chatapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatapp_demo_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - chatapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d chatapp"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: ChatApp.API/Dockerfile
      target: final
    container_name: chatapp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=chatapp;Username=chatapp;Password=${POSTGRES_PASSWORD:-chatapp_demo_password}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost}
      Jwt__Issuer: ChatApp.Dev
      Jwt__Audience: ChatApp.Dev
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-change-this-demo-signing-key-at-least-32-characters}
      Jwt__AccessTokenMinutes: 240
      Uploads__RootPath: /app/wwwroot/uploads
      Uploads__PublicPath: /uploads
      Uploads__MaxFileSizeBytes: 52428800
      SeedAdmin__Email: admin@chat.local
      SeedAdmin__Password: Admin@123456
      SeedAdmin__DisplayName: Admin
    ports:
      - "${API_PORT:-5185}:8080"
    volumes:
      - chatapp_api_uploads:/app/wwwroot/uploads

  frontend:
    build:
      context: .
      dockerfile: ChatApp.UI/Dockerfile
      target: final
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5185}
    container_name: chatapp-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  chatapp_postgres_data:
  chatapp_api_uploads:
